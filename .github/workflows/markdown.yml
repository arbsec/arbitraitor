name: Markdown

on:
  push:
    branches: [main]
    paths: &md_paths
      - "**/*.md"
      - "rumdl.toml"
      - "lefthook.yml"
      - ".mise.toml"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths: *md_paths

permissions:
  contents: read

concurrency:
  group: markdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Lint markdown
        run: rumdl check .

  book-build:
    name: Book Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3  # v2.82.9
        with:
          tool: mdbook,mdbook-mermaid
      - name: Copy ADRs to book
        run: mkdir -p book/src/adr && cp -r docs/adr/* book/src/adr/
      - name: Build book
        run: mdbook build book

  docs-check:
    name: Docs Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Check ADR consistency
        run: cargo run -p xtask -- docs-check

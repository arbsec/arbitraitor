name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - name: Run cargo-deny
        run: cargo deny check --all-features

  cargo-audit:
    name: Advisory Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - name: Run cargo-audit
        run: cargo audit

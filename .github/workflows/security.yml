name: Security

on:
  push:
    branches: [main]
    paths: &security_paths
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".mise.toml"
      - ".github/workflows/security.yml"
  pull_request:
    paths: *security_paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2.83.4
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: cargo deny check

  cargo-audit:
    name: Advisory Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2.83.4
        with:
          tool: cargo-audit
      - name: Run cargo-audit
        run: cargo audit --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2026-0185 --ignore RUSTSEC-2026-0186

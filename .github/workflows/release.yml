name: Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p arbitraitor-cli
      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/arbitraitor
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/arbitraitor-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release arbitraitor
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum arbitraitor-${{ matrix.target }}.tar.gz > arbitraitor-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 arbitraitor-${{ matrix.target }}.tar.gz > arbitraitor-${{ matrix.target }}.tar.gz.sha256
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: arbitraitor-${{ matrix.target }}
          path: dist/arbitraitor-${{ matrix.target }}.tar.gz*

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: dist
          merge-multiple: true
      - name: Get date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          tag: nightly
          name: Nightly Build (${{ steps.date.outputs.date }})
          body: |
            Automated nightly build of Arbitraitor.

            **Build date:** ${{ steps.date.outputs.date }}
            **Commit:** ${{ github.sha }}

            These are pre-release binaries intended for testing. Not for production use.
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: dist/*

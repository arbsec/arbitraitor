name: Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p arbitraitor-cli
      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/arbitraitor
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/arbitraitor-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release arbitraitor
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum arbitraitor-${{ matrix.target }}.tar.gz > arbitraitor-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 arbitraitor-${{ matrix.target }}.tar.gz > arbitraitor-${{ matrix.target }}.tar.gz.sha256
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: arbitraitor-${{ matrix.target }}
          path: dist/arbitraitor-${{ matrix.target }}.tar.gz*

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Count artifacts
        id: artifacts
        run: |
          mkdir -p dist
          count=$(find dist -type f -name '*.tar.gz*' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "::notice::No build artifacts available; skipping release creation."
          else
            echo "Publishing $count artifact(s)."
          fi
          echo "Files in dist/:"
          find dist -type f || true
      - name: Get date and tag
        id: date
        if: steps.artifacts.outputs.count != '0'
        run: |
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "tag=nightly-$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Delete old nightly releases
        if: steps.artifacts.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete nightly releases older than 7 days
          cutoff_date=$(date -u -d '7 days ago' +'%Y-%m-%d' 2>/dev/null || date -u -v-7d +'%Y-%m-%d' 2>/dev/null)
          gh release list --repo "$GITHUB_REPOSITORY" --json tagName,createdAt --jq '.[] | select(.tagName | startswith("nightly-")) | "\(.tagName) \(.createdAt)"' 2>/dev/null | while read tag created; do
            if [[ "$created" < "$cutoff_date" ]]; then
              echo "Deleting old release: $tag (created $created)"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
          done
      - name: Create draft release and upload assets
        if: steps.artifacts.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create as DRAFT first (drafts are NOT immutable)
          gh release create "${{ steps.date.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Nightly Build (${{ steps.date.outputs.date }})" \
            --notes "Automated nightly build of Arbitraitor.

          **Build date:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}

          These are pre-release binaries intended for testing. Not for production use." \
            --prerelease \
            --draft \
            dist/*.tar.gz dist/*.sha256
      - name: Publish release (makes it immutable with all assets attached)
        if: steps.artifacts.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Publishing the draft makes it immutable — but all assets are already attached
          gh release edit "${{ steps.date.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false

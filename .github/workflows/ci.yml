name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - uses: mozilla-actions/sccache-action@7d96ba9496d0e7da6926f15cc2864f8eba33c544  # v0.0.10
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

  test-changed:
    name: Test Changed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - uses: mozilla-actions/sccache-action@7d96ba9496d0e7da6926f15cc2864f8eba33c544  # v0.0.10
      - name: Install cargo-test-changed
        run: cargo install cargo-test-changed --locked
      - name: Test changed crates
        run: cargo test-changed -r nextest --with-dependents

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - uses: mozilla-actions/sccache-action@7d96ba9496d0e7da6926f15cc2864f8eba33c544  # v0.0.10
      - name: Run tests
        run: cargo nextest run --workspace --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: jdx/mise-action@7c8a4c723a61297258ad9651f98b0c04ab6418b2  # v2.2.3
      - uses: mozilla-actions/sccache-action@7d96ba9496d0e7da6926f15cc2864f8eba33c544  # v0.0.10
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps

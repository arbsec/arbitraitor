# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# bincode is unmaintained (RUSTSEC-2025-0141, superseded by RUSTSEC-2026-0185).
# It is a transitive dependency via yara-x which we cannot remove without
# upstream changes. Tracked for resolution when yara-x drops bincode or we
# migrate to an alternative YARA runtime.
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0185",
    "RUSTSEC-2026-0186",
    "RUSTSEC-2026-0190",
]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

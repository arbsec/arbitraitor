[tools]
# Core language toolchain
rust = "1.96.0"

# Git hooks and conventional commits
lefthook = "1.13.0"
cocogitto = "7.0.0"

# Markdown linter
rumdl = "latest"

# CI tools (installed via cargo-binstall — prebuilt binaries)
"cargo:cargo-nextest" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-audit" = "latest"
"cargo:mdbook" = "latest"
"cargo:mdbook-mermaid" = "latest"

[env]
RUST_BACKTRACE = "1"

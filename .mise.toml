[tools]
# Core language toolchain
rust = "1.96.0"

# Git hooks and conventional commits
lefthook = "1.13.0"
cocogitto = "7.0.0"

# Markdown linter
rumdl = "latest"

# CI tools — installed in CI via taiki-e/install-action (prebuilt binaries).
# For local dev, install with: cargo install cargo-nextest cargo-deny cargo-audit mdbook mdbook-mermaid --locked

[env]
RUST_BACKTRACE = "1"
